{% extends 'users/base.html' %}

{% block content %}
<div class="container">
    <h1>Assign {{ person.name }} to a User</h1>
    <form method="POST">
        {% csrf_token %}
        <label for="user">Select User:</label>
        <select name="user_id">
            {% for user in users %}
                <option value="{{ user.id }}">{{ user.username }}</option>
            {% endfor %}
        </select>
        <button type="submit">Assign</button>
    </form>
</div>
{% endblock %}
