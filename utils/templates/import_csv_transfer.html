{% extends "users/base.html" %}
{% load static %}
{% block content %}

<style>


  .upload-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 60px 20px;
  }

  .upload-card {
    background-color: #ffffff;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
    width: 100%;
    max-width: 780px;
    direction: rtl;
  }

  .upload-title {
    font-size: 1.75rem;
    font-weight: 800;
    text-align: center;
    color: #0d6efd;
    margin-bottom: 30px;
  }

  .form-label {
    font-weight: 600;
    color: #444;
    margin-bottom: 8px;
  }

  .form-control {
    border-radius: 12px;
    padding: 10px 16px;
  }

  .btn-upload {
    background-color: #0d6efd;
    border: none;
    padding: 12px 40px;
    border-radius: 16px;
    font-weight: 700;
    font-size: 1rem;
    color: #fff;
    transition: background 0.3s ease;
  }

  .btn-upload:hover {
    background-color: #0b5ed7;
  }

  .alert {
    font-size: 0.95rem;
    border-radius: 12px;
  }

  .form-section hr {
    margin: 30px 0;
    border-top: 1px solid #ddd;
  }
</style>

<div class="container upload-wrapper" dir="rtl">
  <div class="upload-card">
    <h3 class="upload-title">📤 بارگذاری فایل Excel انتقالی</h3>

    {% if error %}
      <div class="alert alert-danger text-center">{{ error }}</div>
    {% endif %}

    <div id="errors-box"></div>


    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="mb-4">
        <label for="file" class="form-label"  style="text-align: right; display: block;">فایل CSV</label>
        <input type="file" name="file" accept=".csv,.xls,.xlsx" class="form-control" required>

      </div>

      <div class="form-section">
        <hr>

        <div class="row">
          <div class="col-md-4 mb-4">
            <label for="col_id" class="form-label"  style="text-align: right; display: block;">نام ستون برای کد کالا</label>
            <input type="text" name="col_id" class="form-control" placeholder="مثلاً: 001" required value="کد">
          </div>

          <div class="col-md-4 mb-4">
            <label for="col_name" class="form-label"  style="text-align: right; display: block;">نام ستون برای نام کالا</label>
            <input type="text" name="col_name" class="form-control" placeholder="مثلاً: نان چاباتا" required value="کالا">
          </div>

          <div class="col-md-4 mb-4">
            <label for="col_name" class="form-label"  style="text-align: right; display: block;">نام ستون برای مقدار کالا</label>
            <input type="text" name="col_unit" class="form-control" placeholder="مثلاً: نان چاباتا" required value="مقدار">
          </div>


          <div class="col-md-4 mb-4">
            <label for="col_unit" class="form-label"  style="text-align: right; display: block;">نام ستون برای انبار مبدا</label>
            <input type="text" name="col_source" class="form-control" placeholder="مثلاً: 1" required value="خروج">
          </div>

          <div class="col-md-4 mb-4">
            <label for="col_pattern" class="form-label"  style="text-align: right; display: block;">نام ستون برای انبار مقصد</label>
            <input type="text" name="col_destination" class="form-control" placeholder="مثلاً: 2" required value="مقصد">
          </div>



        </div>
      </div>

      <div class="text-center mt-4">
        <button type="submit" class="btn btn-upload"> بارگذاری و ذخیره</button>
      </div>
    </form>
  </div>
</div>


<script>
document.querySelector("form").addEventListener("submit", async function(e){
    e.preventDefault();

    const form = e.target;
    const formData = new FormData(form);

    const response = await fetch("", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    // دانلود فایل
    const link = document.createElement("a");
    link.href = "data:application/zip;base64," + data.file;
    link.download = data.filename;
    document.body.appendChild(link);
    link.click();
    link.remove();

    // نمایش خطاها
    const errorBox = document.getElementById("errors-box");
    errorBox.innerHTML = "";

    if(data.errors.length){
        let html = "<div class='alert alert-warning'><ul>";

        data.errors.forEach(e=>{
            html += "<li>"+e+"</li>";
        });

        html += "</ul></div>";
        errorBox.innerHTML = html;
    }
});
</script>



{% endblock %}
